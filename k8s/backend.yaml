apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-backend
  namespace: project-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: REGION-docker.pkg.dev/PROJECT_ID/my-app-repo/backend:IMAGE_TAG
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: my-backend-service
  namespace: project-dev
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5000