stages:
  - build
  - deploy

variables:
  IMAGE: $REGION-docker.pkg.dev/$GCP_PROJECT_ID/my-app-repo/my-app
  DOCKER_TLS_CERTDIR: ""   # ✅ required for docker:dind

before_script:
  - echo "$GCP_SERVICE_KEY" > key.json
  - cat key.json | docker login -u _json_key --password-stdin https://$REGION-docker.pkg.dev

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - docker push $IMAGE:$CI_COMMIT_SHA

deploy:
  stage: deploy
  image: google/cloud-sdk:latest
  script:
    - echo "$GCP_SERVICE_KEY" > key.json
    - gcloud auth activate-service-account --key-file=key.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud container clusters get-credentials $GKE_CLUSTER_NAME --zone $GKE_ZONE

    # ✅ Replace IMAGE_TAG with actual commit SHA
    - sed -i "s|IMAGE_TAG|$CI_COMMIT_SHA|g" k8s/deployment.yaml

    # ✅ Apply namespace + deploy
    - kubectl apply -f k8s/namespace.yaml
    - kubectl apply -n project-dev -f k8s/