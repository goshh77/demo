gke:
  cluster: projects/harsha-497107/locations/asia-south1/clusters/staging-cluster

---
apiVersion: deploy.cloud.google.com/v1
kind: Target

metadata:
  name: prod

gke:
  cluster: projects/harsha-497107/locations/asia-south1/clusters/prod-cluster